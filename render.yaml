services:
  - type: web
    name: listwise-ai
    runtime: docker
    plan: starter
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SCOPES
        value: read_products,write_products
      - key: SHOPIFY_APP_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: DATABASE_URL
        fromDatabase:
          name: listwise-ai-db
          property: connectionString

databases:
  - name: listwise-ai-db
    plan: free
